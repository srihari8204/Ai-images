apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ai-mirror
  labels: { app: api }
spec:
  replicas: 3
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: ghcr.io/aimirror/api:latest
          command: ["/bin/sh", "-c"]
          args: ["alembic upgrade head && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --workers 4 --bind 0.0.0.0:8000 --timeout 60"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: ai-mirror-config }
            - secretRef: { name: ai-mirror-secrets }
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ai-mirror
spec:
  selector: { app: api }
  ports:
    - port: 8000
      targetPort: 8000
