# Non-secret config + secret template. Replace placeholders / use a sealed-secrets
# or external-secrets operator in production — do NOT commit real secrets.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-mirror-config
  namespace: ai-mirror
data:
  ENVIRONMENT: "prod"
  API_V1_PREFIX: "/api/v1"
  PUBLIC_BASE_URL: "https://app.aimirror.example"
  FRONTEND_BASE_URL: "https://app.aimirror.example"
  CORS_ORIGINS: "https://app.aimirror.example"
  S3_ENDPOINT_URL: "http://minio.ai-mirror.svc:9000"
  S3_PUBLIC_ENDPOINT_URL: "https://cdn.aimirror.example"
  REDIS_URL: "redis://redis.ai-mirror.svc:6379/0"
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-mirror-secrets
  namespace: ai-mirror
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_ME"
  DATABASE_URL: "postgresql+asyncpg://aimirror:REPLACE@postgres.ai-mirror.svc:5432/aimirror"
  S3_ACCESS_KEY: "REPLACE_ME"
  S3_SECRET_KEY: "REPLACE_ME"
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
