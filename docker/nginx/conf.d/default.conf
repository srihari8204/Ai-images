# Reverse proxy: API + presigned asset edge. TLS termination config is provided
# in tls.conf.example for production (cert mount + 443 listener).

upstream api_upstream {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Rate-limit zone applied to auth endpoints at the edge (defence in depth).
    # (Application also rate-limits per-IP/account.)
    location / {
        proxy_pass         http://api_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Correlation-ID $request_id;
        proxy_read_timeout 60s;
    }

    # SSE event stream — disable buffering so progress events flush immediately.
    location ~ ^/api/v1/jobs/.*/events$ {
        proxy_pass            http://api_upstream;
        proxy_set_header      Host $host;
        proxy_set_header      X-Correlation-ID $request_id;
        proxy_http_version    1.1;
        proxy_set_header      Connection '';
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    3600s;
        chunked_transfer_encoding on;
    }

    # Public share render — edge-cached per token.
    location /s/ {
        proxy_pass        http://api_upstream;
        proxy_set_header  Host $host;
        proxy_cache       edge;
        proxy_cache_valid 200 302 5m;
        add_header        X-Edge-Cache $upstream_cache_status;
    }

    # Metrics must not be exposed publicly.
    location /metrics { return 403; }
}
