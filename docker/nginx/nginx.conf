worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 30m;

    # Structured access log with the correlation id for end-to-end tracing.
    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"rt":$request_time,'
        '"cid":"$sent_http_x_correlation_id"'
    '}';
    access_log /dev/stdout json;

    # Edge cache for public share renders (/s/{token}) and the style catalog.
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=edge:10m max_size=512m inactive=10m;

    include /etc/nginx/conf.d/*.conf;
}
