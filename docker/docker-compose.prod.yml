name: ai-mirror-prod

# Production-leaning Compose overlay. Prefer Kubernetes (see deploy/) for real
# production; this is a single-host reference. Use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    restart: always
    environment:
      ENVIRONMENT: prod
      DEBUG: "false"
    deploy:
      replicas: 3
    command: >
      /bin/sh -c "alembic upgrade head &&
      gunicorn app.main:app -k uvicorn.workers.UvicornWorker
      --workers 4 --bind 0.0.0.0:8000 --timeout 60"

  worker:
    restart: always
    environment:
      ENVIRONMENT: prod
    deploy:
      replicas: 2

  nginx:
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://app.aimirror.example
    ports: ["3000:3000"]
