name: ai-mirror

# Dev stack: api, worker, postgres, redis, minio, nginx (+ minio bucket init).
# Build context is the repo root so images can copy both backend/ and ai-engine/.

x-app-env: &app-env
  ENVIRONMENT: dev
  SECRET_KEY: dev-insecure-change-me
  DATABASE_URL: postgresql+asyncpg://aimirror:aimirror@postgres:5432/aimirror
  REDIS_URL: redis://redis:6379/0
  S3_ENDPOINT_URL: http://minio:9000
  S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  PUBLIC_BASE_URL: http://localhost:8080
  FRONTEND_BASE_URL: http://localhost:3000
  CORS_ORIGINS: http://localhost:3000,http://localhost:8080

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aimirror
      POSTGRES_PASSWORD: aimirror
      POSTGRES_DB: aimirror
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimirror"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      mc mb -p local/uploads local/outputs local/exports;
      mc ilm import local/exports < /policies/lifecycle.json || true;
      echo 'buckets ready';
      "
    volumes:
      - ../storage/policies:/policies:ro

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      <<: *app-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }
    command: >
      /bin/sh -c "
      alembic upgrade head &&
      python -m app.db.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    expose: ["8000"]
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      <<: *app-env
      WORKER_METRICS_PORT: "9100"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }
    command: ["python", "-m", "ai_engine.worker"]
    expose: ["9100"]

  nginx:
    image: nginx:1.27-alpine
    depends_on: [api]
    ports: ["8080:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

volumes:
  pgdata:
  redisdata:
  miniodata:
