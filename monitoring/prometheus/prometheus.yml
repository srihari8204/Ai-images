# Prometheus scrape configuration for the AI Mirror Platform.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: worker
    static_configs:
      - targets: ["worker:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
