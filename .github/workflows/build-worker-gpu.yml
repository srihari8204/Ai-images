name: Build GPU worker image

# Builds the production GPU worker image and pushes it to GitHub Container
# Registry (GHCR) so RunPod (or any GPU host) can pull it. Runs on demand and
# whenever the worker/backend code changes.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "ai-engine/**"
      - "backend/**"
      - "docker/Dockerfile.worker.gpu"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # CUDA + torch images are large; free up runner disk first.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          swap-storage: true
          docker-images: false

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker.gpu
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ai-images-worker:gpu
            ghcr.io/${{ github.repository_owner }}/ai-images-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image published
        run: echo "Pushed ghcr.io/${{ github.repository_owner }}/ai-images-worker:gpu"
